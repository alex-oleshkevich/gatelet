services:
  gateletd:
    build:
      context: .
    image: gatelet:local
    restart: unless-stopped
    command:
      - --domain
      - ${GATELET_DOMAIN:-tun.example.com}
      - --http
      - :8080
      - --control
      - :4443
    environment:
      GATELET_TOKEN: ${GATELET_TOKEN:?set GATELET_TOKEN}
      GATELET_TOKENS: ${GATELET_TOKENS:-}
      GATELET_ADMIN_USER: ${GATELET_ADMIN_USER:-}
      GATELET_ADMIN_PASSWORD: ${GATELET_ADMIN_PASSWORD:-}
    ports:
      - "${GATELET_HTTP_PORT:-8080}:8080"
